<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的需求 — AI Foundry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        :root { --red:#D12329; --navy:#1a2b49; --bg:#f4f6f9; }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); margin:0; color:#333; }

        .topbar { background:var(--navy); color:white; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .topbar .logo { font-size:18px; font-weight:900; letter-spacing:-0.05em; text-decoration:none; color:white; }
        .topbar .logo span { color:var(--red); }
        .topbar-right { display:flex; align-items:center; gap:16px; font-size:12px; }
        .user-badge { background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:2px; font-size:11px; }

        .main { max-width:960px; margin:0 auto; padding:28px 24px; }
        .page-header { margin-bottom:24px; }
        .page-header h1 { font-size:22px; font-weight:900; color:var(--navy); margin:0 0 4px; }
        .page-header p { font-size:13px; color:#64748b; margin:0; }

        /* ── Request card ── */
        .request-card { background:white; border-radius:4px; box-shadow:0 1px 6px rgba(0,0,0,0.07); margin-bottom:16px; overflow:hidden; }
        .req-head { padding:14px 20px; background:#f8fafc; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .req-id { font-size:12px; color:#94a3b8; font-weight:bold; }
        .req-meta { display:flex; gap:16px; font-size:12px; color:#64748b; }
        .req-status { font-size:11px; font-weight:bold; padding:3px 10px; border-radius:12px; }
        .status-open { background:#f0fdf4; color:#22c55e; }
        .status-closed { background:#f8fafc; color:#94a3b8; }

        .req-body { padding:16px 20px; }
        .req-price { font-size:22px; font-weight:900; color:var(--navy); margin-bottom:12px; }
        .req-price span { font-size:13px; font-weight:normal; color:#94a3b8; }

        .req-type { font-size:11px; font-weight:bold; padding:3px 10px; border-radius:12px; display:inline-block; margin-bottom:12px; }
        .type-cnc { background:#eff6ff; color:#3b82f6; }
        .type-tin { background:#f0fdf4; color:#22c55e; }

        /* ── Quotes section ── */
        .quotes-section { margin-top:16px; border-top:1px solid #f1f5f9; padding-top:16px; }
        .quotes-title { font-size:12px; font-weight:bold; color:#94a3b8; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px; }

        .quote-card { background:#f8fafc; border-radius:3px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
        .quote-card.accepted { background:#f0fdf4; border:1px solid #bbf7d0; }
        .quote-card.rejected { opacity:0.5; }

        .quote-left { flex:1; }
        .quote-supplier { font-size:14px; font-weight:bold; color:var(--navy); margin-bottom:4px; }
        .quote-price-label { font-size:20px; font-weight:900; color:var(--red); margin-bottom:6px; }
        .quote-message { font-size:12px; color:#64748b; line-height:1.5; }
        .quote-date { font-size:11px; color:#94a3b8; margin-top:4px; }

        .quote-right { display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
        .quote-status { font-size:11px; font-weight:bold; padding:3px 10px; border-radius:12px; }
        .q-status-pending  { background:#fffbeb; color:#f59e0b; }
        .q-status-accepted { background:#f0fdf4; color:#22c55e; }
        .q-status-rejected { background:#f8fafc; color:#94a3b8; }

        .btn-accept { padding:7px 16px; background:var(--navy); color:white; border:none; border-radius:3px; font-size:12px; font-weight:bold; cursor:pointer; font-family:inherit; }
        .btn-reject { padding:7px 16px; background:white; color:#94a3b8; border:1px solid #e2e8f0; border-radius:3px; font-size:12px; font-weight:bold; cursor:pointer; font-family:inherit; }
        .btn-accept:hover { background:#243860; }
        .btn-reject:hover { border-color:#94a3b8; }

        .no-quotes { font-size:13px; color:#94a3b8; padding:12px 0; }

        .empty-state { text-align:center; padding:60px 20px; background:white; border-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
        .empty-state h3 { font-size:16px; color:#94a3b8; margin:0 0 8px; }
        .empty-state p { font-size:13px; color:#94a3b8; margin:0 0 20px; }
        .empty-state a { display:inline-block; padding:10px 24px; background:var(--navy); color:white; border-radius:3px; font-size:13px; font-weight:bold; text-decoration:none; }

        .auth-wall { max-width:440px; margin:80px auto; background:white; border-radius:4px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:40px; text-align:center; }
        .auth-wall h2 { font-size:20px; font-weight:900; color:var(--navy); margin:0 0 8px; }
        .auth-wall p { font-size:13px; color:#64748b; margin:0 0 24px; }
        .auth-wall a { display:inline-block; padding:10px 28px; background:var(--navy); color:white; border-radius:3px; font-size:13px; font-weight:bold; text-decoration:none; }

        /* ── Toast ── */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:12px 24px; border-radius:4px; font-size:13px; font-weight:bold; display:none; z-index:999; }
        .toast.show { display:block; }
    </style>
</head>
<body>

<div class="topbar">
    <a href="ai-foundry.html" class="logo">AI <span>FOUNDRY</span></a>
    <div class="topbar-right">
        <span class="user-badge" id="user-badge">載入中...</span>
        <a href="ai-foundry.html" style="color:white; font-size:12px; text-decoration:none;">← 返回主頁</a>
    </div>
</div>

<div id="auth-wall-wrap" style="display:none;">
    <div class="auth-wall">
        <h2>請先登入</h2>
        <p>請登入需求端帳號才能查看您的需求。</p>
        <a href="login.html">前往登入</a>
    </div>
</div>

<div class="main" id="main-content" style="display:none;">
    <div class="page-header">
        <h1>我的需求</h1>
        <p>查看您發布的估價需求，以及供應商的報價回覆</p>
    </div>
    <div id="requests-container">
        <div class="empty-state"><h3>載入中...</h3></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://ai-foundry-backend-production.up.railway.app';
const token = localStorage.getItem('ai_foundry_token');
const currentUser = JSON.parse(localStorage.getItem('ai_foundry_user') || 'null');

const TYPE_LABEL  = { cnc:'CNC 加工', tin:'鐵皮屋', custom:'客製化' };
const TYPE_CLASS  = { cnc:'type-cnc', tin:'type-tin', custom:'type-custom' };
const REGION_LABEL = { all:'全台', north:'北部', central:'中部', south:'南部', east:'東部' };

function showToast(msg, duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
}

function init() {
    if (!token || !currentUser) {
        document.getElementById('auth-wall-wrap').style.display = '';
        return;
    }
    if (currentUser.role !== 'buyer') {
        document.getElementById('auth-wall-wrap').style.display = '';
        document.getElementById('auth-wall-wrap').querySelector('p').textContent = '此頁面僅限需求端會員使用。';
        return;
    }
    const name = currentUser.company_name || currentUser.owner_name || currentUser.email;
    document.getElementById('user-badge').textContent = `👤 ${name}`;
    document.getElementById('main-content').style.display = '';
    loadRequests();
}

async function loadRequests() {
    try {
        const res = await fetch(`${API}/api/my-requests`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
            document.getElementById('requests-container').innerHTML =
                '<div class="empty-state"><h3>載入失敗</h3><p>請重新整理頁面</p></div>';
            return;
        }
        const data = await res.json();
        renderRequests(data);
    } catch(e) {
        document.getElementById('requests-container').innerHTML =
            '<div class="empty-state"><h3>連線失敗</h3><p>請確認網路後重試</p></div>';
    }
}

function renderRequests(requests) {
    const container = document.getElementById('requests-container');
    if (!requests.length) {
        container.innerHTML = `
            <div class="empty-state">
                <h3>還沒有任何需求</h3>
                <p>使用估價系統並發布您的第一筆採購需求</p>
                <a href="ai-foundry.html">前往估價</a>
            </div>`;
        return;
    }

    container.innerHTML = requests.map(r => {
        const typeLabel  = TYPE_LABEL[r.req_type] || r.req_type;
        const typeClass  = TYPE_CLASS[r.req_type] || 'type-cnc';
        const regionLabel = REGION_LABEL[r.region] || r.region || '全台';
        const statusClass = r.status === 'open' ? 'status-open' : 'status-closed';
        const statusLabel = r.status === 'open' ? '招募中' : '已關閉';
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('zh-TW') : '—';

        const quotesHtml = r.quotes && r.quotes.length
            ? r.quotes.map(q => {
                const qStatusClass = q.status === 'accepted' ? 'q-status-accepted' :
                                     q.status === 'rejected' ? 'q-status-rejected' : 'q-status-pending';
                const qStatusLabel = q.status === 'accepted' ? '✓ 已接受' :
                                     q.status === 'rejected' ? '已拒絕' : '等待回應';
                const cardClass = q.status === 'accepted' ? 'quote-card accepted' :
                                  q.status === 'rejected' ? 'quote-card rejected' : 'quote-card';
                const actionBtns = (q.status === 'pending' && r.status === 'open') ? `
                    <button class="btn-accept" onclick="acceptQuote(${q.id})">✓ 接受報價</button>
                    <button class="btn-reject" onclick="rejectQuote(${q.id})">拒絕</button>` : '';
                const qDate = q.created_at ? new Date(q.created_at).toLocaleDateString('zh-TW') : '—';

                return `
                <div class="${cardClass}">
                    <div class="quote-left">
                        <div class="quote-supplier">🏭 ${q.supplier_name || '供應商'}</div>
                        <div class="quote-price-label">NT$ ${q.price.toLocaleString()}</div>
                        ${q.message ? `<div class="quote-message">${q.message}</div>` : ''}
                        <div class="quote-date">${qDate}</div>
                    </div>
                    <div class="quote-right">
                        <span class="quote-status ${qStatusClass}">${qStatusLabel}</span>
                        ${actionBtns}
                    </div>
                </div>`;
            }).join('')
            : '<div class="no-quotes">尚未收到報價，供應商看到您的需求後會送出報價</div>';

        return `
        <div class="request-card">
            <div class="req-head">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="req-id">#${r.id}</span>
                    <span class="req-type ${typeClass}">${typeLabel}</span>
                    <span class="req-status ${statusClass}">${statusLabel}</span>
                </div>
                <div class="req-meta">
                    <span>📅 截止：${r.deadline || '—'}</span>
                    <span>📍 ${regionLabel}</span>
                    <span>🕐 ${date}</span>
                </div>
            </div>
            <div class="req-body">
                <div class="req-price">
                    NT$ ${r.total_price ? Math.round(r.total_price).toLocaleString() : '—'}
                    <span>系統估價</span>
                </div>
                ${r.budget ? `<div style="font-size:12px; color:#64748b; margin-bottom:12px;">預算上限：NT$ ${r.budget.toLocaleString()}</div>` : ''}
                <div class="quotes-section">
                    <div class="quotes-title">收到的報價（${r.quotes ? r.quotes.length : 0} 筆）</div>
                    ${quotesHtml}
                </div>
            </div>
        </div>`;
    }).join('');
}

async function acceptQuote(quoteId) {
    if (!confirm('確定接受此報價？接受後其他報價將自動拒絕，需求將關閉。')) return;
    try {
        const res = await fetch(`${API}/api/quotes/${quoteId}/accept`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) { alert(data.detail || '操作失敗'); return; }
        showToast(`✓ 已接受 ${data.supplier_name} 的報價 NT$ ${data.price.toLocaleString()}`);
        loadRequests();
    } catch(e) {
        alert('連線失敗，請稍後再試');
    }
}

async function rejectQuote(quoteId) {
    try {
        const res = await fetch(`${API}/api/quotes/${quoteId}/reject`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) { const d = await res.json(); alert(d.detail || '操作失敗'); return; }
        showToast('已拒絕此報價');
        loadRequests();
    } catch(e) {
        alert('連線失敗，請稍後再試');
    }
}

init();
</script>
</body>
</html>
